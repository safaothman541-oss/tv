<!doctype html>
<html lang="ckb" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b0e14">
<title>📺 کەناڵەکانی کوردستان — زیندوو</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
<style>
  :root{--bg:#0b0e14;--card:#161b24;--card2:#1d232e;--accent:#e11d48;--ok:#22c55e;--txt:#e8eaed;--txt2:#94a0b3;--line:#232a36}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);font-family:system-ui,-apple-system,'Segoe UI',Tahoma,sans-serif}
  header{padding:13px 16px 11px;text-align:center;background:linear-gradient(180deg,#11161f,#0b0e14);border-bottom:1px solid var(--line)}
  header h1{margin:0;font-size:1.12rem;letter-spacing:.2px}
  header p{margin:4px 0 0;color:var(--txt2);font-size:.78rem}
  #stage{position:sticky;top:0;z-index:20;background:#000;width:100%;aspect-ratio:16/9;max-height:54vh}
  #player{width:100%;height:100%;background:#000;display:block}
  #bar{display:flex;align-items:center;gap:10px;padding:9px 14px;background:var(--card);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:15}
  #now{font-weight:700;font-size:.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
  #search{flex:none;width:42%;max-width:230px;background:#0e131b;border:1px solid var(--line);color:var(--txt);border-radius:20px;padding:8px 13px;font-size:.85rem;outline:none}
  #search:focus{border-color:var(--accent)}
  .wrap{padding:10px 12px 50px}
  .cat{margin:16px 4px 9px;font-size:.92rem;color:var(--txt);font-weight:800;display:flex;align-items:center;gap:8px}
  .cat span{color:var(--txt2);font-weight:600;font-size:.78rem}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(108px,1fr));gap:10px}
  .ch{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 8px;cursor:pointer;transition:.15s;text-align:center;display:flex;flex-direction:column;align-items:center;gap:8px;position:relative}
  .ch:hover{transform:translateY(-2px);border-color:#33425a}
  .ch.active{border-color:var(--accent);background:var(--card2);box-shadow:0 0 0 1px var(--accent)}
  .logo{width:54px;height:54px;border-radius:12px;background:#0e131b;display:flex;align-items:center;justify-content:center;overflow:hidden;flex:none}
  .logo img{width:100%;height:100%;object-fit:contain}
  .logo span{font-size:1.4rem;font-weight:800;color:#5a6b85}
  .ch b{font-size:.8rem;font-weight:600;line-height:1.25;color:var(--txt);word-break:break-word}
  .ch .dot{position:absolute;top:8px;inset-inline-start:8px;width:7px;height:7px;border-radius:50%;background:var(--ok);box-shadow:0 0 7px var(--ok)}
  footer{text-align:center;color:var(--txt2);font-size:.73rem;padding:18px 16px;border-top:1px solid var(--line);margin-top:10px}
  .msg{color:var(--txt2);padding:20px 16px;font-size:.88rem;text-align:center}
</style>
</head>
<body>
<header>
  <h1>📺 کەناڵەکانی کوردستان — زیندوو</h1>
  <p>کلیک لە کەناڵێک بکە بۆ بینین · لەسەر هەموو دیڤایس و سیستەم</p>
</header>
<div id="stage"><video id="player" controls autoplay playsinline></video></div>
<div id="bar">
  <div id="now">👇 کەناڵێک هەڵبژێرە</div>
  <input id="search" placeholder="🔍 گەڕان...">
</div>
<div class="wrap" id="list"><div class="msg">⏳ لیستی کەناڵەکان بار دەبێت...</div></div>
<footer>Vertex 📺 · تەنها بەستەری فەرمی و بەخۆڕایی · لیستەکە خۆکارانە نوێ دەبێتەوە</footer>
<script>
const M3U="kurdistan.m3u";  // same-origin (GitHub Pages) copy — avoids raw CDN 5-min cache
const player=document.getElementById('player'),now=document.getElementById('now'),list=document.getElementById('list'),search=document.getElementById('search');
let hls=null,activeEl=null,sections=[];
function play(url,name,el){
  if(activeEl)activeEl.classList.remove('active');
  el.classList.add('active');activeEl=el;now.textContent="▶️ "+name;
  if(hls){try{hls.destroy();}catch(e){}hls=null;}
  if(window.Hls&&Hls.isSupported()){
    hls=new Hls({maxBufferLength:24,liveSyncDurationCount:3});
    hls.loadSource(url);hls.attachMedia(player);
    hls.on(Hls.Events.MANIFEST_PARSED,()=>player.play().catch(()=>{}));
    hls.on(Hls.Events.ERROR,(e,d)=>{if(d&&d.fatal)now.textContent="⚠️ "+name+" — ئێستا بەردەست نییە، کەناڵێکی تر تاقیبکەرەوە";});
  }else{player.src=url;player.play().catch(()=>{});}
  window.scrollTo({top:0,behavior:'smooth'});
}
function parse(txt){
  const lines=txt.split(/\r?\n/),items=[];let cur=null;
  for(const ln of lines){
    if(ln.startsWith('#EXTINF')){
      const g=(ln.match(/group-title="([^"]*)"/)||[])[1]||'کەناڵەکان';
      const logo=(ln.match(/tvg-logo="([^"]*)"/)||[])[1]||'';
      cur={group:g,logo:logo,name:ln.split(',').slice(1).join(',').trim()};
    }else if(ln&&!ln.startsWith('#')&&cur){cur.url=ln.trim();items.push(cur);cur=null;}
  }
  return items;
}
function card(i){
  const c=document.createElement('div');c.className='ch';
  const initial=(i.name.trim()[0]||'?').toUpperCase();
  c.innerHTML='<span class="dot"></span><div class="logo"><span>'+initial+'</span></div><b></b>';
  c.querySelector('b').textContent=i.name;
  if(i.logo){const img=new Image();img.referrerPolicy='no-referrer';img.onload=()=>{const l=c.querySelector('.logo');l.innerHTML='';l.appendChild(img);};img.src=i.logo;}
  c.onclick=()=>play(i.url,i.name,c);
  return c;
}
function render(items){
  if(!items.length){list.innerHTML='<div class="msg">هیچ کەناڵێک نەدۆزرایەوە</div>';return;}
  const groups={};items.forEach(i=>{(groups[i.group]=groups[i.group]||[]).push(i);});
  list.innerHTML='';sections=[];
  for(const g in groups){
    const h=document.createElement('div');h.className='cat';h.innerHTML='<span style="color:var(--accent)">'+g+'</span> <span>'+groups[g].length+' کەناڵ</span>';
    list.appendChild(h);
    const grid=document.createElement('div');grid.className='grid';const cards=[];
    groups[g].forEach(i=>{const c=card(i);grid.appendChild(c);cards.push({el:c,n:i.name.toLowerCase()});});
    list.appendChild(grid);sections.push({h,grid,cards});
  }
}
search.oninput=()=>{
  const q=search.value.trim().toLowerCase();
  sections.forEach(s=>{let v=0;s.cards.forEach(c=>{const m=!q||c.n.includes(q);c.el.style.display=m?'':'none';if(m)v++;});s.h.style.display=v?'':'none';s.grid.style.display=v?'':'none';});
};
fetch(M3U+"?_="+Date.now(),{cache:"no-store"}).then(r=>r.text()).then(t=>render(parse(t)))
  .catch(()=>{list.innerHTML='<div class="msg">⚠️ نەتوانرا لیستەکە باربکرێت — دواتر هەوڵبدەرەوە</div>';});
</script>
</body>
</html>
