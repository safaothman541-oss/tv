<!doctype html>
<html lang="ckb" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b0e14">
<title>📺 کەناڵەکانی کوردستان — زیندوو</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
<style>
  :root{--bg:#0b0e14;--card:#151a23;--accent:#e11d48;--txt:#e8eaed;--txt2:#9aa3b2}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);font-family:system-ui,-apple-system,'Segoe UI',Tahoma,sans-serif}
  header{padding:14px 16px;text-align:center;border-bottom:1px solid #222}
  header h1{margin:0;font-size:1.15rem}
  header p{margin:5px 0 0;color:var(--txt2);font-size:.8rem}
  #stage{position:sticky;top:0;z-index:10;background:#000;width:100%;aspect-ratio:16/9;max-height:56vh}
  #player{width:100%;height:100%;background:#000;display:block}
  #now{padding:9px 16px;font-weight:700;background:var(--card);border-bottom:1px solid #222;font-size:.9rem}
  .wrap{padding:12px 12px 50px}
  .cat{margin:18px 4px 9px;font-size:.95rem;color:var(--accent);font-weight:800}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
  .ch{background:var(--card);border:1px solid #222;border-radius:12px;padding:14px 12px;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:10px}
  .ch:hover,.ch.active{border-color:var(--accent);background:#1d232e}
  .ch .dot{width:9px;height:9px;border-radius:50%;background:#22c55e;flex:none;box-shadow:0 0 8px #22c55e}
  .ch b{font-size:.92rem;font-weight:600;line-height:1.3}
  footer{text-align:center;color:var(--txt2);font-size:.74rem;padding:18px 16px}
  .msg{color:var(--txt2);padding:14px 16px;font-size:.85rem}
</style>
</head>
<body>
<header>
  <h1>📺 کەناڵەکانی کوردستان — زیندوو</h1>
  <p>کلیک لە کەناڵێک بکە بۆ بینین · لەسەر هەموو دیڤایس و سیستەم کاردەکات</p>
</header>
<div id="stage"><video id="player" controls autoplay playsinline></video></div>
<div id="now">👇 کەناڵێک هەڵبژێرە</div>
<div class="wrap" id="list"><div class="msg">⏳ لیستی کەناڵەکان بار دەبێت...</div></div>
<footer>Vertex 📺 · تەنها بەستەری فەرمی و بەخۆڕایی · لیستەکە خۆکارانە نوێ دەبێتەوە</footer>
<script>
const M3U = "https://raw.githubusercontent.com/safaothman541-oss/tv/main/kurdistan.m3u";
const player=document.getElementById('player'), now=document.getElementById('now'), list=document.getElementById('list');
let hls=null, activeEl=null;
function play(url,name,el){
  if(activeEl) activeEl.classList.remove('active');
  el.classList.add('active'); activeEl=el; now.textContent="▶️ "+name;
  if(hls){ try{hls.destroy();}catch(e){} hls=null; }
  if(window.Hls && Hls.isSupported()){
    hls=new Hls({maxBufferLength:24, liveSyncDurationCount:3});
    hls.loadSource(url); hls.attachMedia(player);
    hls.on(Hls.Events.MANIFEST_PARSED,()=>player.play().catch(()=>{}));
    hls.on(Hls.Events.ERROR,(e,d)=>{ if(d&&d.fatal) now.textContent="⚠️ "+name+" — ئێستا بەردەست نییە، کەناڵێکی تر تاقیبکەرەوە"; });
  } else { player.src=url; player.play().catch(()=>{}); }
  window.scrollTo({top:0,behavior:'smooth'});
}
function parse(txt){
  const lines=txt.split(/\r?\n/), items=[]; let cur=null;
  for(const ln of lines){
    if(ln.startsWith('#EXTINF')){
      const g=(ln.match(/group-title="([^"]*)"/)||[])[1]||'کەناڵەکان';
      cur={group:g, name:ln.split(',').slice(1).join(',').trim()};
    } else if(ln && !ln.startsWith('#') && cur){ cur.url=ln.trim(); items.push(cur); cur=null; }
  }
  return items;
}
function render(items){
  if(!items.length){ list.innerHTML='<div class="msg">هیچ کەناڵێک نەدۆزرایەوە</div>'; return; }
  const groups={}; items.forEach(i=>{(groups[i.group]=groups[i.group]||[]).push(i);});
  list.innerHTML='';
  for(const g in groups){
    const h=document.createElement('div'); h.className='cat'; h.textContent=g; list.appendChild(h);
    const grid=document.createElement('div'); grid.className='grid';
    groups[g].forEach(i=>{
      const c=document.createElement('div'); c.className='ch';
      c.innerHTML='<span class="dot"></span><b></b>';
      c.querySelector('b').textContent=i.name;
      c.onclick=()=>play(i.url,i.name,c);
      grid.appendChild(c);
    });
    list.appendChild(grid);
  }
}
fetch(M3U).then(r=>r.text()).then(t=>render(parse(t)))
  .catch(()=>{ list.innerHTML='<div class="msg">⚠️ نەتوانرا لیستەکە باربکرێت — دواتر هەوڵبدەرەوە</div>'; });
</script>
</body>
</html>
